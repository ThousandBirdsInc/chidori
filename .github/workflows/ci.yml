name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck examples against the SDK types
        run: |
          npx tsc -p ../../examples
          npx tsc -p ../../examples/record-replay

      - name: Build package
        run: npm run build

      - name: Test
        run: npm test

      # If this package.json version is already on npm, the tree must match
      # the published tarball — otherwise the change needs a version bump or
      # it will never publish (release.yml skips existing versions).
      - name: Check published-package drift
        run: SKIP_BUILD=1 ../../scripts/check-npm-drift.sh

  python-sdk:
    name: Python SDK integration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build chidori binary
        run: cargo build

      - name: Run Python SDK client unit tests
        run: python -m unittest sdk/python/tests/test_client_http.py

      - name: Run Python SDK integration tests
        run: python -m unittest sdk/python/tests/test_session_api.py

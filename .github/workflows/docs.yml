# Builds the VitePress docs site from docs/ and deploys it to GitHub Pages.
#
# Requires Pages to be enabled for the repository with "GitHub Actions" as the
# source (Settings → Pages → Build and deployment → Source).
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, but don't cancel an in-flight production
# deploy — let it finish and deploy the newer build after.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: docs
      - name: Build site
        run: npm run build
        working-directory: docs
        env:
          # Project pages are served under /<repo>/. Drop this (or set it to /)
          # if the site moves to a custom domain.
          DOCS_BASE: /chidori/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

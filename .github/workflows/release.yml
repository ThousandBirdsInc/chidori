name: Release

# On a vX.Y.Z tag push this publishes the whole release train:
#   - the chidori-js and chidori crates to crates.io
#   - the TypeScript SDK to npm (@1kbirds/chidori)
#   - the Python SDK to PyPI (chidori)
# and then creates the matching GitHub release. Every publish job uses OIDC
# trusted publishing — no long-lived registry tokens — and skips versions that
# are already on its registry, so re-running a tag's workflow is safe.
#
# A manual workflow_dispatch run is a dry run: it builds and validates every
# package but publishes nothing and creates no GitHub release.
#
# One-time registry setup (the npm/PyPI/crates.io trusted publishers and the
# matching GitHub environments) is documented in docs/releasing.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  verify:
    name: Verify release versions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check the version train
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            ./scripts/check-sdk-versions.sh "${GITHUB_REF_NAME#v}"
          else
            ./scripts/check-sdk-versions.sh
          fi

  npm:
    name: Publish TypeScript SDK to npm
    needs: verify
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC) + provenance
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      # Trusted publishing requires npm >= 11.5.1; the runner image ships older.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Check whether this version is already on npm
        id: check
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if [[ -n "$(npm view "${name}@${version}" version 2>/dev/null || true)" ]]; then
            echo "${name}@${version} is already published; skipping"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      # Skipping an already-published version is only safe if that publish
      # matches this tree. Otherwise the SDK changed without a version bump
      # and the "skip" would silently strand users on stale contents.
      - name: Fail if the published tarball drifted from this tree
        if: steps.check.outputs.published == 'true'
        run: SKIP_BUILD=1 ../../scripts/check-npm-drift.sh

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --dry-run

      - name: Publish
        if: github.ref_type == 'tag' && steps.check.outputs.published == 'false'
        run: npm publish

  pypi:
    name: Publish Python SDK to PyPI
    needs: verify
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      contents: read
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build sdk/python --outdir dist

      - name: Check package metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish
        if: github.ref_type == 'tag'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  crates:
    name: Publish Rust crates to crates.io
    needs: verify
    runs-on: ubuntu-24.04
    environment: crates-io
    permissions:
      contents: read
      id-token: write # crates.io trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins stable; install it up front so the first
      # cargo invocation in publish.sh doesn't pay the auto-fetch.
      - uses: dtolnay/rust-toolchain@stable

      # publish.sh handles dependency order (chidori-js -> chidori), skips
      # versions already on crates.io, and waits for the index between crates.
      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch'
        run: ./scripts/publish.sh --dry-run --skip-tests

      - name: Authenticate to crates.io (OIDC)
        if: github.ref_type == 'tag'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        if: github.ref_type == 'tag'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: ./scripts/publish.sh --skip-tests --yes

  # Prebuilt macOS/Linux `chidori` binaries, attached to the GitHub release so
  # `scripts/install.sh` (curl | sh) and the README quickstart can hand users a
  # binary without a Rust toolchain. The binary links no system TLS (rustls),
  # so the tarballs are self-contained. Both macOS targets build on Apple
  # Silicon runners (macos-14): aarch64 natively, x86_64 by cross-compilation
  # (`--target x86_64-apple-darwin`). The deprecated Intel macos-13 runners are
  # scarce and would leave this job — and therefore the whole github-release
  # job that `needs` it — queued for hours, which is why x86_64 is cross-built
  # here instead. Linux builds on the oldest supported runner for a low glibc
  # floor. Windows users install from source (cargo install chidori). This job
  # runs on dispatch too (a build smoke test) but only the github-release job
  # below publishes the artifacts.
  #
  # Targets the runner can execute natively are built with PGO
  # (scripts/pgo-build.sh --bin chidori): instrument, run the offline training
  # agents, rebuild with feedback. Measured on the shipped binary: -19%
  # wall-clock on in-corpus interpreter-heavy work, -7% on a held-out
  # JS-heavy agent, ~-2% on startup/actor-IPC-bound runs (byte-identical
  # agent outputs). PGO has to *run* the instrumented binary, so the
  # cross-compiled x86_64-apple-darwin target keeps the plain release build
  # rather than gambling on Rosetta.
  binaries:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            pgo: true
          - target: x86_64-apple-darwin
            os: macos-14 # cross-compiled from Apple Silicon; macos-13 Intel runners are scarce
            pgo: false # can't natively run the instrumented binary (see above)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            pgo: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            pgo: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools # llvm-profdata, for the PGO merge step

      - name: Build release binary (PGO)
        if: matrix.pgo
        run: |
          mkdir -p "target/${{ matrix.target }}/release"
          ./scripts/pgo-build.sh --bin chidori --target ${{ matrix.target }} --locked \
            "target/${{ matrix.target }}/release/chidori"

      - name: Build release binary
        if: ${{ !matrix.pgo }}
        run: cargo build --release --locked --bin chidori --target ${{ matrix.target }}

      - name: Package (tar.gz)
        shell: bash
        run: |
          name="chidori-${GITHUB_REF_NAME:-dev}-${{ matrix.target }}"
          tar -C "target/${{ matrix.target }}/release" -czf "${name}.tar.gz" chidori
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: chidori-${{ matrix.target }}
          path: |
            chidori-*.tar.gz
            chidori-*.tar.gz.sha256
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    needs: [npm, pypi, crates, binaries]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --generate-notes finds the prior tag

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: chidori-*
          path: dist
          merge-multiple: true

      - name: Create the release (if missing) and upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; updating assets"
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --verify-tag \
              dist/*
          fi

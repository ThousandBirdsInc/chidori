name: QuickJS Fork

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: macOS x64
            os: macos-13
            target: x86_64-apple-darwin
          - name: macOS arm64
            os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Check QuickJS sys crate
        run: cargo check -p chidori-quickjs-sys --target ${{ matrix.target }}

      - name: Test QuickJS wrapper crate
        run: cargo test -p chidori-quickjs --target ${{ matrix.target }}
